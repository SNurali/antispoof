# nginx server-block: TLS-termination + client-cert (mTLS) verification
# перед antispoof-сервисом (uvicorn, слушает 127.0.0.1:8090 после этого изменения).
#
# Устанавливается как /etc/nginx/sites-available/antispoof-mtls.conf
# + симлинк /etc/nginx/sites-enabled/antispoof-mtls.conf
#
# ЗАВИСИМОСТИ (см. MTLS-DEPLOY-CHECKLIST.md):
#   1. antispoof.service должен слушать 127.0.0.1:8090, НЕ 0.0.0.0:8090
#      (иначе mTLS обходится прямым запросом на порт 8090 в обход nginx).
#   2. /etc/nginx/mtls/egaz-antispoof/{server.crt,server.key,ca.crt} на месте, права:
#        server.key  600 root:root
#        server.crt  644 root:root
#        ca.crt      644 root:root
#
# ВАЖНО (BUSTA RHYMES, находка при подготовке): app/main.py делает IP-allowlist по
# request.client.host, а 127.0.0.0/8 УЖЕ в ALLOWED_NETWORKS. Как только nginx
# проксирует на 127.0.0.1, приложение видит peer=127.0.0.1 для ЛЮБОГО внешнего
# клиента — app-level allowlist автоматически "проходит" всех, кто достучался до
# nginx. Это НЕ баг в этом конфиге, а неизбежный побочный эффект reverse-proxy —
# компенсируем на уровне nginx блоком `allow/deny` ниже (ЗАПОЛНИТЬ реальный IP
# партнёра перед включением, см. чек-лист).

upstream antispoof_backend {
    server 127.0.0.1:8090;
    keepalive 8;
}

# HTTP -> HTTPS редирект (эндпоинт m2m, но пусть будет явный редирект,
# а не тихий приём голого HTTP)
server {
    listen 80;
    server_name egaz-02.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name egaz-02.uz;

    # --- Серверный сертификат (наш mini-CA) ---
    ssl_certificate     /etc/nginx/mtls/egaz-antispoof/server.crt;
    ssl_certificate_key /etc/nginx/mtls/egaz-antispoof/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;

    # --- mTLS: проверка клиентского сертификата партнёра нашим CA ---
    ssl_client_certificate /etc/nginx/mtls/egaz-antispoof/ca.crt;
    ssl_verify_client on;
    ssl_verify_depth 1;

    # CRL для мгновенного отзыва скомпрометированного клиентского сертификата
    # (см. generate-mtls-ca.sh revoke). Раскомментировать, когда появится
    # /etc/nginx/mtls/egaz-antispoof/ca.crl:
    # ssl_crl /etc/nginx/mtls/egaz-antispoof/ca.crl;

    # DoS-защита: тело запроса (фото для liveness, base64/multipart).
    # /verify — одно фото до 8MB (app/main.py MAX_BASE64_BYTES), берём с запасом.
    client_max_body_size 20m;

    access_log /var/log/nginx/antispoof-mtls.access.log;
    error_log  /var/log/nginx/antispoof-mtls.error.log;

    # --- ОПЦИОНАЛЬНО, но настоятельно рекомендуется: сетевой allowlist на
    # реальный (не подменённый прокси) egress-IP партнёра — компенсирует
    # эффект из шапки файла. Включить после подтверждения IP с Умидом:
    # allow  1.2.3.4;       # egress IP партнёрского Laravel-бэкенда
    # allow  127.0.0.1;     # локальные проверки/мониторинг
    # deny   all;

    location / {
        proxy_pass http://antispoof_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Сохраняем реальный IP клиента и служебные заголовки без изменений —
        # X-Service-Token, будущий anti-replay заголовок (SNOOP), Authorization
        # и любые другие кастомные заголовки проходят как есть (nginx не режет
        # заголовки, если явно не скрыты через proxy_hide_header).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Трассировка: CN клиентского сертификата, который прошёл mTLS-проверку —
        # полезно в логах приложения/nginx для аудита, кто именно (какой партнёрский
        # клиентский сертификат) сделал вызов.
        proxy_set_header X-Client-Cert-CN $ssl_client_s_dn_cn;
        proxy_set_header X-Client-Cert-Verify $ssl_client_verify;

        proxy_pass_request_headers on;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # /verify_batch может нести до MAX_BATCH (16) фото — отдельный лимит побольше.
    location /verify_batch {
        proxy_pass http://antispoof_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Client-Cert-CN $ssl_client_s_dn_cn;
        proxy_pass_request_headers on;

        client_max_body_size 150m;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://antispoof_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }
}
